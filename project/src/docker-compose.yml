services:
  mysql:
    image: mysql:8.4
    container_name: staff_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: security_demo
      MYSQL_USER: staff_db
      MYSQL_PASSWORD: 123456
    ports:
        - "3306:3306"
    volumes:
        - staff_mysql_data:/var/lib/mysql

volumes:
  staff_mysql_data: